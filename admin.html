<!DOCTYPE html>
<html>
<head>
  <title>Minecraft Version Tracker – Admin</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #adminContent {
      display: none; /* Hidden until PIN is entered */
    }
    #adminPinLock {
      border: 1px solid #ccc;
      padding: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <!-- ========================= -->
  <!-- PIN LOCK SCREEN           -->
  <!-- ========================= -->
  <div id="adminPinLock">
    <h2>Admin PIN Required</h2>
    <input id="pinInput" type="password" placeholder="Enter PIN">
    <button id="pinSubmit">Unlock</button>
    <p id="pinStatus"></p>
  </div>


  <!-- ========================= -->
  <!-- ADMIN CONTENT (HIDDEN)    -->
  <!-- ========================= -->
  <div id="adminContent">

    <h2>Add Update</h2>

    <form id="updateForm">
      <label>Version (e.g., 1.21.0)</label><br>
      <input id="version" type="text"><br><br>

      <label>Caption</label><br>
      <input id="caption" type="text"><br><br>

      <label>Image URL</label><br>
      <input id="image" type="text"><br><br>

      <button type="submit">Add Update</button>
    </form>

    <p id="status"></p>

    <h2>Existing Updates</h2>
    <div id="updatesList"></div>

  </div>

  <script src="admin.js"></script>

</body>
</html>
